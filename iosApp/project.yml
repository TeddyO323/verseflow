name: VerseFlowiOS
options:
  bundleIdPrefix: com.example
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  VerseFlowiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - VerseFlowiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.verseflow.ios
        PRODUCT_NAME: VerseFlow
        INFOPLIST_FILE: VerseFlowiOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"VerseFlowiOS/Preview Content\""
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
